<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Dégradé des secteurs déjà écrits -->
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0FBBA6" />
            <stop offset="55%" style="stop-color:#20B583" />
            <stop offset="100%" style="stop-color:#4CB050" />
        </linearGradient>
    </defs>
    <!-- Anneau Flash : emplacements vierges -->
    <circle cx="16" cy="16" r="10.25" fill="none" stroke="#334155" stroke-width="5.5"/>
    <!-- Secteurs écrits : 5 sur 8 -->
    <circle cx="16" cy="16" r="10.25" fill="none" stroke="url(#ringGrad)" stroke-width="5.5"
            stroke-dasharray="40.25 24.15" transform="rotate(-90 16 16)"/>
    <!-- Séparateurs des 8 secteurs -->
    <g stroke="#0f172a" stroke-width="1">
        <line x1="16" y1="8.5" x2="16" y2="3"/>
        <line x1="21.30" y1="10.70" x2="25.19" y2="6.81"/>
        <line x1="23.5" y1="16" x2="29" y2="16"/>
        <line x1="21.30" y1="21.30" x2="25.19" y2="25.19"/>
        <line x1="16" y1="23.5" x2="16" y2="29"/>
        <line x1="10.70" y1="21.30" x2="6.81" y2="25.19"/>
        <line x1="8.5" y1="16" x2="3" y2="16"/>
        <line x1="10.70" y1="10.70" x2="6.81" y2="6.81"/>
    </g>
    <!-- Tête d'écriture -->
    <circle cx="8.75" cy="23.25" r="3" fill="#F59F00"/>
    <circle cx="8.75" cy="23.25" r="1.6" fill="#FCD34D"/>
</svg>
